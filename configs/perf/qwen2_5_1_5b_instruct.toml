[service]
model = "Qwen/Qwen2.5-1.5B-Instruct"
protocol = "openai-chat"
engine_name = "vllm"
precision = "fp16"

[tokenizer]
type = "hf"
ref = "Qwen/Qwen2.5-1.5B-Instruct"

[workload]
ctx_lens = [512, 1024, 2048, 4096, 8192]
concurrency_levels = [1, 2, 4, 8, 16]
batch_sizes = [1, 2, 4, 8, 16]
output_tokens = 128
warmup_runs = 1
measure_runs = 3
temperature = 0.0
top_p = 1.0
timeout_s = 600.0
seed = 42

[vllm]
launch = true
# 方案 1：直接复用当前项目环境时，先执行：
# uv sync --extra vllm-cu128 --reinstall-package torch --reinstall-package torchaudio --reinstall-package torchvision --reinstall-package vllm
# 默认会复用当前 benchmark 进程的 Python 解释器。
# 如果你改走独立环境，再取消下面这行注释：
# python_executable = "/home/chase/.venvs/vllm-cu128/bin/python"
host = "127.0.0.1"
port = 8001
dtype = "half"
tensor_parallel_size = 1
gpu_memory_utilization = 0.9
max_model_len = 8192
max_num_seqs = 16
max_num_batched_tokens = 16384
trust_remote_code = false
extra_args = ["--no-enable-log-requests"]
startup_timeout_s = 600.0
log_path = "/tmp/vllm_qwen2_5_1_5b_perf.log"

[hardware]
gpu_index = 0
hardware_label = "local-gpu"
