# Prompt ablation records.
# Generate commands:
# uv run python scripts/prompt_ablation.py --prompt-set prompt_trials.toml --run-id prompt_test_001 --models <model.pth> --pg-dbname prompt --overwrite --disable-checker
#
# Full new-weight command:
# uv run python scripts/prompt_ablation.py \
#     --prompt-set prompt_trials.toml \
#     --run-id prompt_full_new_weight_round01 \
#     --models /home/caizus/Weights/BlinkDL__rwkv7-g1/rwkv7-g1f-1.5b-20260419-ctx8192.pth \
#              /home/caizus/Weights/BlinkDL__rwkv7-g1/rwkv7-g1f-2.9b-20260420-ctx8192.pth \
#     --pg-dbname prompt \
#     --overwrite \
#     --disable-checker \
#     --skip-missing-dataset
#
# Important:
# - Do not set avg_k/report_avg_k here unless the trial is explicitly testing sampling.
# - The overlay inherits true benchmark avg_k/report_avg_k from configs/<benchmark>.toml.
# - max_samples is only the pilot subset size.

