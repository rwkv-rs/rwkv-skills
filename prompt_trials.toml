# Prompt ablation records.
# Run generator example:
# uv run python scripts/prompt_ablation.py --prompt-set prompt_trials.toml --run-id prompt_test_001 --models <paths...> --overwrite --disable-checker

[trial.multi_choice_zh_cot_v1]
description = "Chinese multi-choice CoT, concise single-answer constraint."
jobs = ["multi_choice_cot"]
benchmarks = ["ceval_cot", "cmmlu_cot"]
max_samples = 80
avg_k = [2]
report_avg_k = [2]
cot_prompt_template = """User: 请解答这道单选题，只能选择一个最佳选项。思考时请始终对应选项字母。
<Q>
<CHOICES>

Assistant: <think"""
final_prompt_template = """<Q><COT>
只输出最终选项字母："""

[trial.multi_choice_zh_cot_v2]
description = "Chinese multi-choice CoT, shorter wording for smaller RWKV models."
jobs = ["multi_choice_cot"]
benchmarks = ["ceval_cot", "cmmlu_cot"]
max_samples = 80
avg_k = [2]
report_avg_k = [2]
cot_prompt_template = """User: 从选项中选出唯一正确答案。
<Q>
<CHOICES>

Assistant: <think"""
final_prompt_template = """<Q><COT>
答案选项是"""

