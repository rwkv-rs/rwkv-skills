# Prompt ablation records.
# Generate commands:
# uv run python scripts/prompt_ablation.py --prompt-set prompt_trials.toml --run-id prompt_test_001 --models <model.pth> --pg-dbname prompt --overwrite --disable-checker
#
# Important:
# - Do not set avg_k/report_avg_k here unless the trial is explicitly testing sampling.
# - The overlay inherits true benchmark avg_k/report_avg_k from configs/<benchmark>.toml.
# - max_samples is only the pilot subset size.

[trial.control_zh_cot]
description = "Control: original Chinese multi-choice CoT prompt."
jobs = ["multi_choice_cot"]
benchmarks = ["ceval_cot", "cmmlu_cot"]
max_samples = 80

[trial.multi_choice_zh_cot_v1]
description = "Chinese CoT: minimal unique-option instruction."
jobs = ["multi_choice_cot"]
benchmarks = ["ceval_cot", "cmmlu_cot"]
max_samples = 80
cot_prompt_template = """User: 选出唯一正确选项。
<Q>
<CHOICES>

Assistant:<think"""
final_prompt_template = """<Q><COT>
答案："""

[trial.multi_choice_zh_cot_v2]
description = "Chinese CoT: short reasoning with final option letter."
jobs = ["multi_choice_cot"]
benchmarks = ["ceval_cot", "cmmlu_cot"]
