[trial.free_response_format_v1]
description = "Free-response CoT prompt, format-aware but shorter than the reverted default."
jobs = ["free_response", "free_response_judge"]
benchmarks = ["asdiv_cot", "svamp_cot", "gsm8k_cot", "math_500_cot"]
max_samples = 80
avg_k = [2]
report_avg_k = [2]
cot_prompt_template = """User: Solve the problem carefully. Keep the answer format and units requested by the question. Do not give the final answer yet.

<Q>

Assistant: <think"""
final_prompt_template = """<Q><COT>
Give only the final answer, using the requested format and units.
Answer:"""

